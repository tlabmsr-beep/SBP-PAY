<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система быстрых платежей (СБП) | Оплата</title>
    <style>
        :root {
            --bg-body: #f4f5f7;
            --bg-frame: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --text-title: #1c3144;
            --bg-input: #f2f2f7;
            --bg-copy: #f8f9fa;
            --border-color: #e5e5ea;
            --border-dash: #d1d1d6;
            --btn-bg: #1c1c1e;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #000000;
                --bg-frame: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #98989d;
                --text-title: #ffffff;
                --bg-input: #2c2c2e;
                --bg-copy: #2c2c2e;
                --border-color: #38383a;
                --border-dash: #48484a;
                --btn-bg: #ffffff;
                --btn-text: #000000;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-primary);
            padding: 20px 10px;
            transition: background-color 0.3s ease;
        }

        .phone-frame {
            background-color: var(--bg-frame);
            width: 100%;
            max-width: 420px;
            min-height: 700px;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .logo-container { display: flex; flex-direction: column; align-items: center; margin-top: 10px; margin-bottom: 25px; text-align: center; }
        .sbp-logo-wrapper { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .sbp-main-img-svg { width: 62px; height: 62px; }
        .sbp-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
        .sbp-main-title { font-size: 34px; font-weight: 900; color: var(--text-title); letter-spacing: -0.5px; text-transform: lowercase; }
        .sbp-subtitle { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .timer-badge {
            display: flex; align-items: center; gap: 6px; background-color: rgba(255, 59, 48, 0.1);
            color: #ff3b30; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
            margin-bottom: 30px; align-self: center;
        }
        .timer-icon { width: 14px; height: 14px; fill: currentColor; }

        .merchant-box {
            background: var(--bg-input);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
        .merchant-avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, #5856D6, #007AFF);
            color: white; display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: 800; margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.2);
        }
        .merchant-title { font-size: 22px; font-weight: 800; color: var(--text-primary); text-align: center; margin-bottom: 6px; letter-spacing: -0.3px; }
        .merchant-subtitle { font-size: 15px; color: var(--text-secondary); text-align: center; font-weight: 500; }

        .btn-universal-sbp {
            width: 100%; height: 70px; border-radius: 22px;
            background-color: var(--btn-bg);
            color: var(--btn-text); text-decoration: none;
            display: flex; justify-content: center; align-items: center;
            font-size: 19px; font-weight: 700; letter-spacing: -0.2px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative; overflow: hidden;
        }
        .btn-universal-sbp:active { transform: scale(0.96); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
        
        .sbp-btn-logo { width: 30px; height: 30px; margin-right: 12px; }

        .spinner {
            width: 26px; height: 26px; border: 3px solid rgba(128,128,128,0.3);
            border-radius: 50%; border-top-color: currentColor;
            animation: spin 0.8s linear infinite; margin: auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .trust-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--text-secondary); margin-top: auto; font-weight: 500; padding-top: 40px;}
        .lock-icon { width: 14px; height: 14px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <!-- HEADER -->
        <div class="logo-container">
            <div class="sbp-logo-wrapper">
                <svg class="sbp-main-img-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 65 L35 35 L50 50 L35 80 Z" fill="#5856D6" opacity="0.85"/>
                    <path d="M35 35 L65 35 L50 50 L20 65 Z" fill="#007AFF" opacity="0.9"/>
                    <path d="M50 20 L65 50 L50 50 L35 35 Z" fill="#FFCC00" opacity="0.9"/>
                    <path d="M65 50 L80 35 L50 20 L50 50 Z" fill="#FF9500" opacity="0.85"/>
                    <path d="M50 50 L65 50 L50 80 L35 80 Z" fill="#34C759" opacity="0.9"/>
                    <path d="M65 50 L80 65 L50 80 L65 50 Z" fill="#4CD964" opacity="0.85"/>
                </svg>
                <div class="sbp-text">
                    <span class="sbp-main-title">сбп</span>
                    <span class="sbp-subtitle">система быстрых<br>платежей</span>
                </div>
            </div>
            
            <div class="timer-badge">
                <svg class="timer-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                Время на оплату: <span id="countdownTimer">15:00</span>
            </div>
        </div>

        <!-- MERCHANT INFO -->
        <div class="merchant-box">
            <div class="merchant-avatar">E</div>
            <div class="merchant-title">elexlans (smart moha)</div>
            <div class="merchant-subtitle">Оплата заказа</div>
        </div>

        <!-- UNIVERSAL PAYMENT BUTTON -->
        <a href="https://qr.nspk.ru/BS1A0010CJTRDE3T81FPTQKH64V5KDI8?type=01&bank=100000000191&crc=D5BC" class="btn-universal-sbp" id="payBtn">
            <svg class="sbp-btn-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 65 L35 35 L50 50 L35 80 Z" fill="#5856D6"/>
                <path d="M35 35 L65 35 L50 50 L20 65 Z" fill="#007AFF"/>
                <path d="M50 20 L65 50 L50 50 L35 35 Z" fill="#FFCC00"/>
                <path d="M65 50 L80 35 L50 20 L50 50 Z" fill="#FF9500"/>
                <path d="M50 50 L65 50 L50 80 L35 80 Z" fill="#34C759"/>
                <path d="M65 50 L80 65 L50 80 L65 50 Z" fill="#4CD964"/>
            </svg>
            <span>Оплатить через СБП</span>
        </a>

        <!-- TRUST INDICATOR -->
        <div class="trust-indicator">
            <svg class="lock-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            Безопасный перевод через систему СБП
        </div>

    </div>

    <script>
        let time = 15 * 60;
        const timerEl = document.getElementById('countdownTimer');
        setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            timerEl.innerText = `${m}:${s}`;
            if(time > 0) time--;
        }, 1000);

        document.getElementById('payBtn').addEventListener('click', function(e) {
            const url = this.getAttribute('href');
            e.preventDefault();
            if (navigator.vibrate) navigator.vibrate(50);
            
            this.innerHTML = `<div class="spinner"></div>`;
            
            setTimeout(() => {
                window.location.href = url;
            }, 600);
        });
    </script>
</body>
</html>
